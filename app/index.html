<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link rel="icon" type="image/svg+xml" href="/assets/icons/favicon.svg">
    <link rel="stylesheet" href="/css/shared-styles.css">
    <link rel="stylesheet" href="/css/app.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
    <script type="module" src="/js/ison/main.js"></script>
  </head>
  <body>
    <header class="topnav">
      <div class="nav-inner">
        <a href="/" target="_blank" class="logo">
          <img src="/assets/icons/favicon.svg" alt="Logo">
          Byz<span id="logo-bold">Ison</span>
        </a>
        <button class="settings-btn" id="open-settings">
          <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" aria-hidden="true" role="img" width="40" height="40" viewBox="0 0 16 16"><path fill="currentColor" d="M.84 11.49v-.1zm.23.38L1 11.68zM1 11.68l-.11-.19zm-.21-.29c-.06-.1-.11-.21-.16-.31c.05.1.1.21.16.31m.32.54v-.06z"></path><path fill="currentColor" d="m11.26 12.63l1.83 1.09a7.3 7.3 0 0 0 1-.94a7.5 7.5 0 0 0 1.56-2.86l-1.74-1A5.3 5.3 0 0 0 14 8a5.3 5.3 0 0 0-.08-.9l1.74-1a7.5 7.5 0 0 0-1.33-2.58a7.5 7.5 0 0 0-1.24-1.22l-1.83 1.04a6 6 0 0 0-1.11-.53v-2A8.6 8.6 0 0 0 7.94.53a8.4 8.4 0 0 0-2.26.3v2a7 7 0 0 0-1.12.54L2.78 2.28A7.46 7.46 0 0 0 .2 6.06l1.72 1a5.3 5.3 0 0 0-.08.9a5.3 5.3 0 0 0 .08.9l-1.73 1a8 8 0 0 0 .43 1.15c.05.1.1.21.16.31v.1l.11.19l.12.19v.06a7.7 7.7 0 0 0 1.64 1.78l1.81-1.08a7 7 0 0 0 1.12.54v2a8.4 8.4 0 0 0 2.26.31a8.6 8.6 0 0 0 2.22-.3v-2a6 6 0 0 0 1.2-.48m-2.39 1.52a8 8 0 0 1-.95.06a8 8 0 0 1-1-.06v-1.69a4.9 4.9 0 0 1-2.53-1.27l-1.54.92a6.2 6.2 0 0 1-1.08-1.61l1.56-.93a4.27 4.27 0 0 1 0-3.17l-1.56-.92a6.1 6.1 0 0 1 1.12-1.62l1.56.93A5 5 0 0 1 7 3.53V1.82a8 8 0 0 1 1-.06a8 8 0 0 1 .95.06v1.72a4.9 4.9 0 0 1 2.4 1.26l1.59-.94a6.3 6.3 0 0 1 1.11 1.62l-1.6.94a4.4 4.4 0 0 1 .3 1.58a4.4 4.4 0 0 1-.29 1.55l1.56.93a6.4 6.4 0 0 1-1.11 1.61l-1.58-.93a5 5 0 0 1-2.49 1.28z"></path><path fill="currentColor" d="M7.92 5.49A2.59 2.59 0 0 0 5.25 8a2.59 2.59 0 0 0 2.67 2.51A2.6 2.6 0 0 0 10.6 8a2.6 2.6 0 0 0-2.68-2.51M8 9.2A1.35 1.35 0 0 1 6.55 8A1.35 1.35 0 0 1 8 6.7A1.35 1.35 0 0 1 9.39 8A1.35 1.35 0 0 1 8 9.2"></path></svg>
        </button>
      </div>
    </header>
    <div id="app-layout">
      <div id="content">
        <div id="note-grid">
          <div class="note-row align-left">
            <button class="note-btn" id="note-high-ni">Νη</button>
          </div>
          <div class="note-row">
            <button class="note-btn" id="note-di">Δι</button>
            <button class="note-btn" id="note-ke">Κε</button>
            <button class="note-btn" id="note-zo-flat">Ζω<span class="enharmonic-fthora">p</span></button>
            <button class="note-btn" id="note-zo">Ζω</button>
          </div>
          <div class="note-row">
            <button class="note-btn" id="note-ni">Νη</button>
            <button class="note-btn" id="note-pa">Πα</button>
            <button class="note-btn" id="note-bou">Βου</button>
            <button class="note-btn" id="note-ga">Γα</button>
          </div>
          <div class="note-row">
            <button class="note-btn" id="note-low-di">Δι</button>
            <button class="note-btn" id="note-low-ke">Κε</button>
            <button class="note-btn" id="note-low-zo-flat">Ζω<span class="enharmonic-fthora">p</span></button>
            <button class="note-btn" id="note-low-zo">Ζω</button>
          </div>
          <div class="note-row align-right">
            <button class="note-btn" id="note-low-ga">Γα</button>
          </div>
        </div>
        <div id="pitch-control">
          <button class="pitch-btn" id="pitch-down">-</button>
          <p id="pitch-shift">pitch</p>
          <button class="pitch-btn" id="pitch-up">+</button>
        </div>
      </div>
    </div>
    <div id="settings-backdrop" class="backdrop" hidden></div>
    <aside id="settings-panel" aria-hidden="true">
      <header id="settings-header">
        <button class="settings-btn" id="close-settings">✕</button>
      </header>
      <div id="settings-content">
        <div class="settings-section" id="sound-type-select">
          <h2>Sound type</h2>
          <div class="radio">
            <input type="radio" id="vocals" name="audioType" value="vox1">
            <label for="vocals">Vocals</label>
          </div>
          <div class="radio">
            <input type="radio" id="synth" name="audioType" value="1.25" checked="true">
            <label for="synth">Organ</label>
          </div>
        </div>
      </div>
    </aside>
  </body>
</html>
